name: HTTPS Tunnel (Web Browsing Look)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: התקנת Chisel בשרת
        run: |
          curl -sSL https://github.com/jpillora/chisel/releases/download/v1.10.0/chisel_1.10.0_linux_amd64.tar.gz | tar xz
          sudo mv chisel /usr/local/bin/
          chisel --version

      - name: הפעלת שרת Chisel ברקע
        run: |
          # מפעיל שרת Chisel עם שם משתמש וסיסמה מאובטחים
          nohup chisel server --port 8080 --auth "user:pass123" > /tmp/chisel.log 2>&1 &
          sleep 2

      - name: הפעלת ngrok במצב HTTP (חינמי וללא אשראי)
        run: |
          # התקנת ngrok
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -q && sudo apt-get install -y -q ngrok
          
          # הגדרת טוקן והפעלה כמנהרת HTTP רגילה
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          nohup ngrok http 8080 > /tmp/ngrok.log 2>&1 &
          
          sleep 8
          echo "=== Ngrok Log ==="
          cat /tmp/ngrok.log
          echo "================="

      - name: הדפסת הנחיות התחברות
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data['tunnels'][0]['public_url'])
          except:
              print('ERROR')
          ")
          
          if [ "$URL" = "ERROR" ] || [ -z "$URL" ]; then
            echo "❌ נכשל בקבלת הכתובת מ-ngrok. בדוק את הלוג למעלה."
            exit 1
          fi
          
          echo ""
          echo "✅ הצינור מוכן ומחופש לגלישה רגילה!"
          echo "🌐 כתובת ה-HTTPS שלך היא: $URL"
          echo "--------------------------------------------------"
          echo "💻 פקודה להרצה במחשב שלך בטרמינל:"
          echo "chisel client --auth user:pass123 $URL 1080:socks"
          echo "--------------------------------------------------"
          echo ""
          
      - name: שמירת השרת פעיל (שעה אחת)
        run: sleep 3600
